<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Каталог храмов и монастырей — Православный Мир</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .catalog-header { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }
        .catalog-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 4vw, 48px); font-weight: 700; color: var(--dark); line-height: 1.15; }
        .catalog-header h1 em { font-style: italic; color: var(--gold); }
        .catalog-header p { font-size: 16px; color: var(--text-muted); max-width: 600px; line-height: 1.7; }

        .catalog-filters {
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
            margin-bottom: 32px;
        }
        .filter-btn {
            padding: 8px 20px; border-radius: 100px; border: 1px solid var(--cream-2);
            background: var(--white); font-size: 13px; color: var(--text-muted);
            cursor: pointer; transition: all var(--transition); font-family: 'Inter', sans-serif; white-space: nowrap;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--dark); color: var(--gold-light); border-color: var(--dark); }
        .filter-group-label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-right: 4px; }

        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .catalog-item {
            background: var(--white); border-radius: var(--radius-md);
            padding: 16px 20px; box-shadow: var(--shadow-card);
            border: 1px solid var(--cream-2);
            transition: transform var(--transition), box-shadow var(--transition);
            text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 8px;
        }
        .catalog-item:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .catalog-item .item-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--dark); }
        .catalog-item .item-region { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .catalog-item .item-category { font-size: 12px; color: var(--gold); font-weight: 600; }
        .catalog-item .item-status { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .catalog-item .item-link { margin-top: 8px; font-size: 13px; color: var(--gold); font-weight: 500; display: flex; align-items: center; gap: 4px; }

        .no-results { grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted); font-size: 16px; }
        .no-results .big-icon { font-size: 48px; display: block; margin-bottom: 12px; }

        @media (max-width: 560px) {
            .catalog-grid { grid-template-columns: 1fr; }
            .filter-btn { font-size: 12px; padding: 6px 14px; }
            .catalog-item { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <div id="nav-container"></div>
    <div id="bottom-nav-container"></div>

    <div class="page-section">
        <div class="breadcrumbs">
            <a href="../index.html">Главная</a> &rarr;
            <span>Каталог храмов</span>
        </div>

        <div class="catalog-header">
            <h1>Храмы и монастыри<br><em>России и СНГ</em></h1>
            <p>Исследуйте великие святыни, узнавайте их историю и планируйте паломничество.</p>
        </div>

        <div class="catalog-filters" id="filtersContainer">
            <span class="filter-group-label">Регион:</span>
            <button class="filter-btn active" data-filter-type="region" data-value="all">Все</button>
            
            <span class="filter-group-label" style="margin-left:20px;">Категория:</span>
            <button class="filter-btn active" data-filter-type="category" data-value="all">Все</button>
            <button class="filter-btn" data-filter-type="category" data-value="Храм">Храм</button>
            <button class="filter-btn" data-filter-type="category" data-value="Собор">Собор</button>
            <button class="filter-btn" data-filter-type="category" data-value="Монастырь">Монастырь</button>
            <button class="filter-btn" data-filter-type="category" data-value="Часовня">Часовня</button>
        </div>

        <div class="catalog-grid" id="catalogGrid">
            <div class="no-results"><span class="big-icon">📖</span>Загрузка данных...</div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="../js/config.js"></script>
    <script src="../js/components.js"></script>

    <script>
        const dataFiles = ['../data/spb_temples.json'];
        let allData = [];
        let filteredData = [];

        function generateLink(name) {
            const slug = name.toLowerCase()
                .replace(/[^a-zа-я0-9\s]/g, '')
                .replace(/\s+/g, '-');
            return `../objects/${slug}.html`;
        }

        async function loadCatalogData() {
            const grid = document.getElementById('catalogGrid');
            try {
                const fetchPromises = dataFiles.map(url => fetch(url).then(resp => {
                    if (!resp.ok) throw new Error(`Ошибка загрузки ${url}`);
                    return resp.json();
                }));
                const results = await Promise.all(fetchPromises);
                allData = results.flat();
                allData = allData.filter(item => item.name && item.region);

                allData.forEach(item => {
                    if (!item.link) {
                        item.link = generateLink(item.name);
                    }
                });

                buildFilters();
                applyFilters();
            } catch (error) {
                console.error('Ошибка загрузки каталога:', error);
                grid.innerHTML = `
                    <div class="no-results">
                        <span class="big-icon">⚠️</span>
                        <p>Не удалось загрузить данные каталога.</p>
                        <p style="font-size:13px; margin-top:8px;">Проверьте наличие файла spb_temples.json в папке data/</p>
                    </div>
                `;
            }
        }

        function buildFilters() {
            const regions = [...new Set(allData.map(item => item.region))].sort();
            const container = document.getElementById('filtersContainer');
            const allRegionBtn = container.querySelector('[data-filter-type="region"][data-value="all"]');
            let regionHTML = '';
            regions.forEach(region => {
                regionHTML += `<button class="filter-btn" data-filter-type="region" data-value="${region}">${region}</button>`;
            });
            allRegionBtn.insertAdjacentHTML('afterend', regionHTML);

            container.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const type = this.dataset.filterType;
                    container.querySelectorAll(`.filter-btn[data-filter-type="${type}"]`).forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    applyFilters();
                });
            });
        }

        function applyFilters() {
            const activeRegion = document.querySelector('.filter-btn[data-filter-type="region"].active')?.dataset.value || 'all';
            const activeCategory = document.querySelector('.filter-btn[data-filter-type="category"].active')?.dataset.value || 'all';

            filteredData = allData.filter(item => {
                const regionMatch = activeRegion === 'all' || item.region === activeRegion;
                const categoryMatch = activeCategory === 'all' || item.category === activeCategory;
                return regionMatch && categoryMatch;
            });

            renderCatalog(filteredData);
        }

        function renderCatalog(data) {
            const grid = document.getElementById('catalogGrid');
            if (data.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <span class="big-icon">🔍</span>
                        <p>По выбранным фильтрам ничего не найдено</p>
                    </div>
                `;
                return;
            }

            let html = '';
            data.forEach(item => {
                const statusHtml = item.status ? `<div class="item-status">Статус: ${item.status}</div>` : '';
                html += `
                    <a href="${item.link}" class="catalog-item" target="_blank">
                        <div class="item-name">${item.name}</div>
                        <div class="item-region">📍 ${item.region}</div>
                        <div class="item-category">${item.category || 'Объект'}</div>
                        ${statusHtml}
                        <div class="item-link">Подробнее →</div>
                    </a>
                `;
            });
            grid.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', loadCatalogData);
    </script>
</body>
</html>
