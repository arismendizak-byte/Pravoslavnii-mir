<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Святыни — Православный Мир</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .holiness-header { text-align: center; margin-bottom: 40px; }
        .holiness-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 4vw, 48px); font-weight: 700; color: var(--dark); line-height: 1.15; }
        .holiness-header h1 em { font-style: italic; color: var(--gold); }
        .holiness-header p { font-size: 16px; color: var(--text-muted); max-width: 600px; margin: 0 auto; line-height: 1.7; }

        .holiness-search {
            display: flex;
            align-items: center;
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 4px 16px;
            box-shadow: var(--shadow-card);
            margin: 0 auto 24px auto;
            max-width: 500px;
            border: 1px solid var(--cream-2);
        }
        .holiness-search input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            padding: 12px 0;
            background: transparent;
            font-family: 'Inter', sans-serif;
        }
        .holiness-search input::placeholder {
            color: var(--text-muted);
        }
        .holiness-search .search-icon {
            font-size: 20px;
            margin-right: 10px;
            color: var(--text-muted);
        }

        .holiness-filters {
            display: flex; gap: 10px; flex-wrap: nowrap; overflow-x: auto;
            padding-bottom: 8px; margin-bottom: 32px; scrollbar-width: none;
        }
        .holiness-filters::-webkit-scrollbar { display: none; }
        .filter-btn {
            flex-shrink: 0; padding: 8px 20px; border-radius: 100px; border: 1px solid var(--cream-2);
            background: var(--white); font-size: 13px; color: var(--text-muted);
            cursor: pointer; transition: all var(--transition); font-family: 'Inter', sans-serif; white-space: nowrap;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--dark); color: var(--gold-light); border-color: var(--dark); }

        .holiness-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

        .holiness-card {
            background: var(--white);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: transform var(--transition), box-shadow var(--transition);
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .holiness-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

        .holiness-card-img {
            height: 200px; width: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 64px;
            background: linear-gradient(135deg, var(--dark-3), #1A3A2A);
        }
        .holiness-card:nth-child(2) .holiness-card-img { background: linear-gradient(135deg, #2C1E0A, #1A2A35); }
        .holiness-card:nth-child(3) .holiness-card-img { background: linear-gradient(135deg, #1A2A35, #2C1E0A); }
        .holiness-card:nth-child(4) .holiness-card-img { background: linear-gradient(135deg, #1E2C1A, #35280A); }
        .holiness-card:nth-child(5) .holiness-card-img { background: linear-gradient(135deg, #251A35, #1A3A2A); }

        .holiness-body { padding: 20px; }
        .holiness-tag {
            display: inline-block; background: var(--gold-pale); color: var(--dark-2);
            font-size: 11px; font-weight: 600; padding: 2px 12px; border-radius: 100px; text-transform: uppercase; margin-bottom: 8px;
        }
        .holiness-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px; font-weight: 700; color: var(--dark);
            margin-bottom: 4px; line-height: 1.3;
        }
        .holiness-title {
            font-size: 13px; color: var(--gold); font-weight: 500; margin-bottom: 8px;
        }
        .holiness-desc {
            font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 12px;
        }

        .holiness-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 13px; color: var(--text-muted);
            border-top: 1px solid var(--cream-2); padding-top: 12px;
        }
        .holiness-feast { font-weight: 500; color: var(--gold); }
        .holiness-location { font-weight: 500; color: var(--gold); }

        /* НОВЫЕ КНОПКИ ДЕЙСТВИЙ */
        .holiness-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .holiness-actions a {
            flex: 1;
            text-align: center;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: all var(--transition);
            min-width: 120px;
        }
        .btn-location {
            background: var(--gold-pale);
            color: var(--dark);
            border: 1px solid var(--gold);
        }
        .btn-location:hover {
            background: var(--gold-light);
        }
        .btn-route {
            background: var(--cream-2);
            color: var(--dark);
            border: 1px solid var(--cream-2);
        }
        .btn-route:hover {
            background: var(--gold-pale);
        }

        @media (max-width: 560px) {
            .holiness-card-img { height: 160px; }
            .holiness-name { font-size: 18px; }
            .holiness-actions a { min-width: 80px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="nav-container"></div>
    <div id="bottom-nav-container"></div>

    <div class="page-section">
        <div class="breadcrumbs">
            <a href="index.html">Главная</a> &rarr;
            <span>Святыни</span>
        </div>

        <div class="holiness-header">
            <h1>Святые, иконы<br><em>и мощи</em></h1>
            <p>Путеводитель по величайшим святыням православного мира. Жития святых, чудотворные иконы и местонахождение святых мощей.</p>
        </div>

        <div class="holiness-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="holinessSearch" placeholder="Поиск по имени, месту, святому..." oninput="applySearchAndFilter()">
        </div>

        <div class="holiness-filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="saint">Святые</button>
            <button class="filter-btn" data-filter="icon">Чудотворные иконы</button>
            <button class="filter-btn" data-filter="relic">Святые мощи</button>
        </div>

        <div class="holiness-grid" id="holinessGrid"></div>
    </div>

    <div id="footer-container"></div>

    <script>
        let allData = [];

        fetch('data/holiness.json')
            .then(response => response.json())
            .then(data => {
                allData = data;
                renderHoliness(data, 'all');
                
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        applySearchAndFilter();
                    });
                });
            })
            .catch(error => {
                console.error('Ошибка загрузки святынь:', error);
                document.getElementById('holinessGrid').innerHTML = '<p style="text-align:center;color:var(--text-muted);">Не удалось загрузить данные. Проверьте файл data/holiness.json</p>';
            });

        function applySearchAndFilter() {
            const searchText = document.getElementById('holinessSearch').value.toLowerCase().trim();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

            let filtered = activeFilter === 'all' 
                ? allData 
                : allData.filter(item => item.type === activeFilter);

            if (searchText !== '') {
                filtered = filtered.filter(item => {
                    const searchable = [
                        item.name,
                        item.title,
                        item.description,
                        item.feast_day || '',
                        item.relics || '',
                        item.location || '',
                        item.saint || ''
                    ].join(' ').toLowerCase();
                    return searchable.includes(searchText);
                });
            }

            renderHoliness(filtered, 'all', true);
        }

        function renderHoliness(data, filter, skipFilter) {
            const grid = document.getElementById('holinessGrid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
                        <span style="font-size: 48px; display: block;">🔍</span>
                        <p>Ничего не найдено по вашему запросу</p>
                    </div>
                `;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'holiness-card';

                let metaHtml = '';
                let actionsHtml = '';

                if (item.type === 'saint') {
                    metaHtml = `
                        <div class="holiness-meta">
                            <span class="holiness-feast">📅 ${item.feast_day}</span>
                            <span class="holiness-location">⛪ ${item.relics}</span>
                        </div>
                    `;
                    actionsHtml = `
                        <div class="holiness-actions">
                            <a href="${item.link || '#'}" class="btn-location">📍 Где мощи</a>
                            <a href="/routes/routes.html?search=${encodeURIComponent(item.name)}" class="btn-route">🗺️ Маршруты к святому</a>
                        </div>
                    `;
                } else if (item.type === 'icon') {
                    metaHtml = `
                        <div class="holiness-meta">
                            <span class="holiness-location">📍 ${item.location}</span>
                        </div>
                    `;
                    actionsHtml = `
                        <div class="holiness-actions">
                            <a href="${item.link || '#'}" class="btn-location">📍 Где находится</a>
                            <a href="/routes/routes.html?search=${encodeURIComponent(item.name)}" class="btn-route">🗺️ Маршруты к иконе</a>
                        </div>
                    `;
                } else if (item.type === 'relic') {
                    metaHtml = `
                        <div class="holiness-meta">
                            <span class="holiness-feast">🙏 ${item.saint}</span>
                            <span class="holiness-location">⛪ ${item.location}</span>
                        </div>
                    `;
                    actionsHtml = `
                        <div class="holiness-actions">
                            <a href="${item.link || '#'}" class="btn-location">📍 Где мощи</a>
                            <a href="/routes/routes.html?search=${encodeURIComponent(item.saint)}" class="btn-route">🗺️ Маршруты к святому</a>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="holiness-card-img">${item.emoji}</div>
                    <div class="holiness-body">
                        <div class="holiness-tag">${item.type === 'saint' ? 'Святой' : item.type === 'icon' ? 'Икона' : 'Мощи'}</div>
                        <div class="holiness-name">${item.name}</div>
                        <div class="holiness-title">${item.title}</div>
                        <div class="holiness-desc">${item.description}</div>
                        ${metaHtml}
                        ${actionsHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>

    <script src="js/config.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
